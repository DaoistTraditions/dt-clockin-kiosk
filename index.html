<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DT Clinic Clock-In</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #2f332d;
      color: white;
      margin: 0;
      padding: 20px;
    }
    h1 {
      margin-top: 16px;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 22px;
      margin-bottom: 24px;
      color: #e8e8e8;
    }
    #status {
      max-width: 700px;
      margin: 0 auto 20px auto;
      padding: 18px;
      border-radius: 16px;
      font-size: 20px;
      font-weight: bold;
      background: #4b4f49;
    }
    .error {
      background: #c96b63 !important;
      color: white;
    }
    .success {
      background: #3e8e5a !important;
      color: white;
    }
    #reader {
      width: 100%;
      max-width: 520px;
      margin: 20px auto;
      display: none;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }
    button {
      font-size: 24px;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      background: white;
      color: #333;
      cursor: pointer;
      margin-top: 10px;
    }
    #restartBtn {
      display: none;
    }
    .help {
      margin-top: 18px;
      color: #efefef;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>DT Clinic Clock-In</h1>
  <div class="sub">Hold your badge QR code in front of the camera</div>

  <div id="status">Tap Start Scanner</div>

  <button id="startBtn" onclick="startScanner()">Start Scanner</button>
  <button id="restartBtn" onclick="restartScanner()">Restart Scanner</button>

  <div id="reader"></div>

  <div class="help">If the browser asks for camera permission, tap Allow.</div>

  <script>
    let html5QrCode = null;
    let scannerRunning = false;
    let isLogging = false;

    function setStatus(message, className = "") {
      const status = document.getElementById("status");
      status.className = className;
      status.textContent = message;
    }

async function startScanner() {
  setStatus("Requesting camera access...");
  document.getElementById("reader").style.display = "block";
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "inline-block";

  try {
    const testStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });

    testStream.getTracks().forEach(track => track.stop());

    html5QrCode = new Html5Qrcode("reader");

    const cameras = await Html5Qrcode.getCameras();
    if (!cameras || cameras.length === 0) {
      throw new Error("No cameras found");
    }

let cameraId = cameras[0].id;
const frontCam = cameras.find(c =>
  (c.label || "").toLowerCase().includes("front") ||
  (c.label || "").toLowerCase().includes("user")
);
if (frontCam) cameraId = frontCam.id;

    await html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: { width: 250, height: 250 }},
      onScanSuccess,
      () => {}
    );

    scannerRunning = true;
    setStatus("Ready to scan");
  } catch (err) {
    console.error(err);
    const msg = (err && err.name)
      ? `${err.name}: ${err.message || "Camera request failed"}`
      : `Camera failed: ${String(err)}`;
    setStatus(msg, "error");
  }
}

    async function restartScanner() {
      try {
        if (html5QrCode && scannerRunning) {
          await html5QrCode.stop();
        }
      } catch (e) {
        console.log("Stop warning:", e);
      }

      scannerRunning = false;
      isLogging = false;
      document.getElementById("reader").innerHTML = "";
      html5QrCode = null;
      document.getElementById("startBtn").style.display = "inline-block";
      document.getElementById("restartBtn").style.display = "none";
      document.getElementById("reader").style.display = "none";
      setStatus("Tap Start Scanner");
    }

    async function onScanSuccess(decodedText) {
      if (isLogging) return;
      isLogging = true;

      setStatus("Clocking in...");

      try {
        const url = new URL(decodedText);
        const id = url.searchParams.get("id");

        if (!id) {
          throw new Error("No intern ID found in QR code");
        }

await fetch(decodedText, { mode: "no-cors" });

setStatus("✓ Clock-in recorded for " + id, "success");

        setTimeout(() => {
          setStatus("Ready to scan");
          isLogging = false;
        }, 2000);

      } catch (err) {
        console.error(err);
        setStatus("Scan failed. Try again.", "error");
        setTimeout(() => {
          setStatus("Ready to scan");
          isLogging = false;
        }, 2000);
      }
    }
  </script>
</body>
</html>
